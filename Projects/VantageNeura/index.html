<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VantageNeura — AI Automation for UK Businesses</title>
    <meta name="description" content="VantageNeura helps UK businesses automate workflows, integrate AI, and reclaim hours lost to manual work.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            min-height: 100%;
            font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0A1410 0%, #0F1F18 100%);
            background-attachment: fixed;
            color: #F1F5F9;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(15,118,110,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15,118,110,0.03) 1px, transparent 1px);
            background-size: 52px 52px;
            pointer-events: none;
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── NAV ── */
        nav {
            padding: 16px 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards 0.05s;
        }

        /* Logo Y-axis flip — continuous */
        .logo-wrap {
            display: inline-block;
            perspective: 140px;
            flex-shrink: 0;
        }

        @keyframes logoFlip {
            from { transform: rotateY(0deg);   }
            to   { transform: rotateY(360deg); }
        }

        .nav-logo {
            width: 30px;
            height: auto;
            display: block;
            animation: logoFlip 3.5s linear infinite;
        }

        .nav-brand {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #F1F5F9 0%, #5EEAD4 50%, #F1F5F9 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        /* ── HERO ── */
        /* Measured at desktop 1440px:
           nav=70px + hero(pad-top 24 + eyebrow 27 + h1 109 + p 66 + strip 27 + pad-bottom 28) = 281px
           Capability strip bottom = 351px from top.
           Carousel-outer top = 351px. Card top-edge = 351 + 95 = 446px. Gap = 95px. */
        .hero {
            text-align: center;
            padding: 18px 24px 22px;
            flex-shrink: 0;
        }

        @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeUp  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .hero-eyebrow {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: #14B8A6;
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.15s;
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(26px, 3.8vw, 44px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #F1F5F9 10%, #5EEAD4 50%, #F1F5F9 90%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.28s;
        }

        .hero p {
            font-size: clamp(13px, 1.6vw, 15px);
            color: #4B5563;
            max-width: 380px;
            margin: 0 auto 16px;
            line-height: 1.65;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.42s;
        }

        .capability-strip {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            font-weight: 500;
            color: #4B5563;
            letter-spacing: 0.4px;
            border: 1px solid rgba(15,118,110,0.2);
            border-radius: 100px;
            padding: 7px 16px;
            background: rgba(15,118,110,0.04);
            opacity: 0;
            animation: fadeUp 0.5s ease forwards 0.52s;
        }

        .capability-strip .sep { color: rgba(15,118,110,0.3); font-size: 10px; }

        /* ── CAROUSEL SECTION ── fills remaining viewport height */
        .carousel-section {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards 0.65s;
        }

        /* Outer grows to fill section minus dots row */
        .carousel-outer {
            position: relative;
            flex: 1;
            min-height: 0;
            width: 1100px;
            max-width: calc(100vw - 16px);
            margin: 0 auto;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1200px;
        }

        /* ── CARDS — 10% bigger: 200→220, 310→341 ── */
        .carousel-card {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 220px;
            height: 375px;
            margin-left: -110px;  /* -width/2 */
            margin-top:  -204px;  /* keeps bottom fixed, top grows up (375-171=204) */
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        opacity   0.55s ease,
                        filter    0.55s ease;
            will-change: transform, opacity, filter;
            visibility: hidden;
        }

        .card-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(10,20,16,0.25) 0%,
                rgba(10,20,16,0.0)  30%,
                rgba(10,20,16,0.65) 62%,
                rgba(10,20,16,0.94) 100%
            );
        }

        .carousel-card.custom-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            border: 2px dashed rgba(20,184,166,0.3);
            z-index: 5;
            pointer-events: none;
        }

        .card-body {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 18px;
            z-index: 2;
        }

        .card-icon-wrap {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: rgba(10,20,16,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(20,184,166,0.28);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.22s ease, border-color 0.22s ease;
        }

        .card-icon-wrap svg {
            width: 15px;
            height: 15px;
            stroke: #2DD4BF;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card-text-wrap { display: flex; flex-direction: column; gap: 9px; }

        .card-text {
            font-family: 'Work Sans', sans-serif;
            font-size: 13.5px;
            font-weight: 600;
            color: #F1F5F9;
            line-height: 1.45;
        }

        .card-cta {
            font-family: 'Work Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #14B8A6;
            letter-spacing: 0.2px;
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .carousel-card.is-center:hover .card-cta     { opacity: 1; transform: translateY(0); }
        .carousel-card.is-center:hover .card-icon-wrap {
            background: rgba(15,118,110,0.45);
            border-color: rgba(20,184,166,0.55);
        }

        /* ── ARROWS ── */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(15,118,110,0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(15,118,110,0.22);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }

        .carousel-btn:hover {
            background: rgba(15,118,110,0.28);
            border-color: rgba(15,118,110,0.45);
            transform: translateY(-50%) scale(1.08);
        }

        .carousel-btn:active { transform: translateY(-50%) scale(0.96); }

        .carousel-btn svg {
            width: 17px;
            height: 17px;
            stroke: #14B8A6;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Arrows sit just inside outer edges */
        .carousel-btn-prev { left: 12px;  }
        .carousel-btn-next { right: 12px; }

        /* ── DOTS — pulled closer to cards ── */
        .carousel-dots {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 4px;
            padding-bottom: 6px;
            flex-shrink: 0;
        }

        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(15,118,110,0.22);
            cursor: pointer;
            border: none;
            padding: 0;
            transition: background 0.25s, transform 0.25s;
        }

        .carousel-dot.active {
            background: #14B8A6;
            transform: scale(1.4);
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 10px 24px;
            color: #14B8A6;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 960px) {
            .carousel-outer { width: 700px; max-width: calc(100vw - 16px); }
        }

        @media (max-width: 600px) {
            nav  { padding: 14px 20px; }
            .hero { padding: 14px 20px 16px; }
            .hero h1 { font-size: clamp(22px, 5.5vw, 34px); }
            .hero p  { margin-bottom: 10px; }
            .carousel-outer { width: 100%; max-width: 100vw; }
            .carousel-card {
                width: 170px;
                height: 290px;
                margin-left: -85px;
                margin-top:  -158px;
            }
            .card-text  { font-size: 12.5px; }
            .card-body  { padding: 14px; }
            .capability-strip { font-size: 10px; gap: 8px; padding: 6px 14px; }
        }
    </style>
</head>
<body>
<div class="page-wrapper">

    <nav>
        <div class="logo-wrap" aria-hidden="true">
            <svg class="nav-logo" viewBox="0 0 140 160" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="nL" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%"   stop-color="#2DD4BF"/>
                        <stop offset="50%"  stop-color="#0F766E"/>
                        <stop offset="100%" stop-color="#0D5950"/>
                    </linearGradient>
                    <linearGradient id="nR" x1="100%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%"   stop-color="#2DD4BF"/>
                        <stop offset="50%"  stop-color="#0F766E"/>
                        <stop offset="100%" stop-color="#0D5950"/>
                    </linearGradient>
                </defs>
                <polygon points="38,10 52,10 77,91 70,113.5" fill="url(#nL)"/>
                <polygon points="102,10 88,10 73,57 80,80"   fill="url(#nR)"/>
                <circle cx="70" cy="138" r="7" fill="#2DD4BF" opacity="0.9"/>
            </svg>
        </div>
        <span class="nav-brand">VantageNeura</span>
    </nav>

    <div class="hero">
        <span class="hero-eyebrow">Helping Businesses Reach Their Pinnacle</span>
        <h1>What's holding your<br>business back?</h1>
        <p>Pick the challenge that sounds most like you. We'll show you exactly how to fix it.</p>
        <div class="capability-strip">
            <span>Save Time</span>
            <span class="sep">·</span>
            <span>Win More Clients</span>
            <span class="sep">·</span>
            <span>Scale Faster</span>
        </div>
    </div>

    <div class="carousel-section" id="carouselSection">
        <div class="carousel-outer" id="carouselOuter">
            <div class="carousel-track" id="carouselTrack"></div>
            <button class="carousel-btn carousel-btn-prev" id="prevBtn" aria-label="Previous">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="carousel-btn carousel-btn-next" id="nextBtn" aria-label="Next">
                <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>
        <div class="carousel-dots" id="carouselDots"></div>
    </div>

    <footer>VantageNeura</footer>

</div>

<script>
    // ================================================================
    //  PROBLEM CARDS
    //  Images: Unsplash CDN — replace with real photos when available
    // ================================================================
    var PROBLEMS = [
        {
            text: "I'm drowning in admin tasks that eat my day",
            img: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&h=620&fit=crop&auto=format&q=80',
            alt: 'Busy office desk with paperwork',
            icon: '<svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9h6m-6 4h4"/></svg>'
        },
        {
            text: "My team spends too long on manual reporting",
            img: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=400&h=620&fit=crop&auto=format&q=80',
            alt: 'Analytics and reporting on screen',
            icon: '<svg viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>'
        },
        {
            text: "I can't get a clear picture of my business performance",
            img: 'https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&h=620&fit=crop&auto=format&q=80',
            alt: 'Person at laptop reviewing data',
            icon: '<svg viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>'
        },
        {
            text: "We lose leads because our follow-up is too slow",
            img: 'https://images.unsplash.com/photo-1423592707957-3b212afa6733?w=400&h=620&fit=crop&auto=format&q=80',
            alt: 'Phone on office desk',
            icon: '<svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>'
        },
        {
            text: "Onboarding new team members takes way too long",
            img: 'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&h=620&fit=crop&auto=format&q=80',
            alt: 'Complex team training session with whiteboard',
            icon: '<svg viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>'
        },
        {
            text: "My tools and systems don't connect to each other",
            img: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=400&h=620&fit=crop&auto=format&q=80',
            alt: 'Server room and cables',
            icon: '<svg viewBox="0 0 24 24"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>'
        },
        {
            text: "I want to modernise my business but don't know where to start",
            img: 'https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=400&h=620&fit=crop&auto=format&q=80',
            alt: 'Modern tech laptop on desk',
            icon: '<svg viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>'
        },
        {
            text: "Something else? Tell us in your own words",
            img: 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=400&h=620&fit=crop&auto=format&q=80',
            alt: 'Person at desk with notebook and coffee',
            custom: true,
            icon: '<svg viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>'
        }
    ];
    // ================================================================

    var TOTAL         = PROBLEMS.length;
    var currentIdx    = 0;
    var timer         = null;
    var VISIBLE_RANGE = window.innerWidth > 960 ? 2 : 1;

    // Card positions per visible range (integer offsets only — CSS transition handles movement)
    var POS = {
        2: [
            { x:   0, scale: 1.00, opacity: 1.00, blur: 0, rotY:  0  },
            { x: 240, scale: 0.84, opacity: 0.48, blur: 3, rotY: -9  },
            { x: 455, scale: 0.68, opacity: 0.24, blur: 6, rotY: -15 }
        ],
        1: [
            { x:   0, scale: 1.00, opacity: 1.00, blur: 0, rotY:  0  },
            { x: 190, scale: 0.82, opacity: 0.42, blur: 3, rotY: -10 }
        ]
    };

    // ── Build cards ──
    var track  = document.getElementById('carouselTrack');
    var dotsEl = document.getElementById('carouselDots');
    var outer  = document.getElementById('carouselOuter');

    PROBLEMS.forEach(function(p, i) {
        var card = document.createElement('div');
        card.className = 'carousel-card' + (p.custom ? ' custom-card' : '');
        card.dataset.index = i;
        card.innerHTML =
            '<img class="card-bg" src="' + p.img + '" alt="' + p.alt + '" loading="lazy">' +
            '<div class="card-overlay"></div>' +
            '<div class="card-body">' +
                '<div class="card-icon-wrap">' + p.icon + '</div>' +
                '<div class="card-text-wrap">' +
                    '<div class="card-text">' + p.text + '</div>' +
                    '<div class="card-cta">Let\'s fix this &rarr;</div>' +
                '</div>' +
            '</div>';

        card.addEventListener('click', function() {
            var diff = i - currentIdx;
            var half = Math.floor(TOTAL / 2);
            if (diff >  half) diff -= TOTAL;
            if (diff < -half) diff += TOTAL;

            if (diff === 0) {
                window.location.href = p.custom
                    ? 'form.html?problem=other'
                    : 'form.html?problem=' + encodeURIComponent(p.text);
            } else {
                advance(diff > 0 ? 1 : -1);
            }
        });

        track.appendChild(card);
    });

    // ── Build dots ──
    PROBLEMS.forEach(function(_, i) {
        var dot = document.createElement('button');
        dot.className = 'carousel-dot';
        dot.setAttribute('aria-label', 'Card ' + (i + 1));
        dot.addEventListener('click', function() {
            currentIdx = i;
            updateCarousel();
        });
        dotsEl.appendChild(dot);
    });

    // ── Update all card positions via CSS transitions ──
    function getOffset(idx) {
        var diff = idx - currentIdx;
        var half = Math.floor(TOTAL / 2);
        if (diff >  half) diff -= TOTAL;
        if (diff < -half) diff += TOTAL;
        return diff;
    }

    function updateCarousel() {
        var cards = track.querySelectorAll('.carousel-card');
        var dots  = dotsEl.querySelectorAll('.carousel-dot');
        var cfg   = POS[VISIBLE_RANGE];

        cards.forEach(function(card, i) {
            var off  = getOffset(i);
            var abs  = Math.abs(off);
            var sign = off >= 0 ? 1 : -1;

            card.classList.remove('is-center');

            if (abs > VISIBLE_RANGE) {
                card.style.visibility = 'hidden';
                card.style.opacity    = '0';
                return;
            }

            var p = cfg[abs];
            card.style.visibility = 'visible';
            card.style.transform  = 'translateX(' + (p.x * sign) + 'px) scale(' + p.scale + ') rotateY(' + (p.rotY * sign) + 'deg)';
            card.style.opacity    = String(p.opacity);
            card.style.filter     = p.blur > 0 ? 'blur(' + p.blur + 'px)' : 'none';
            card.style.zIndex     = String(12 - abs * 4);

            if (abs === 0) card.classList.add('is-center');
        });

        dots.forEach(function(dot, i) {
            dot.classList.toggle('active', i === currentIdx);
        });
    }

    function advance(dir) {
        currentIdx = (currentIdx + dir + TOTAL) % TOTAL;
        updateCarousel();
    }

    // ── setInterval auto-advance — dwell 3.5s, then CSS-transition step ──
    function startTimer() {
        clearInterval(timer);
        timer = setInterval(function() { advance(1); }, 4500);
    }

    function stopTimer() { clearInterval(timer); }

    outer.addEventListener('mouseenter', stopTimer);
    outer.addEventListener('mouseleave', startTimer);

    // ── Arrows ──
    document.getElementById('prevBtn').addEventListener('click', function() { advance(-1); });
    document.getElementById('nextBtn').addEventListener('click', function() { advance(1);  });

    // ── Touch swipe ──
    var touchStartX = 0;
    track.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
        stopTimer();
    }, { passive: true });

    track.addEventListener('touchend', function(e) {
        var delta = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(delta) > 44) advance(delta > 0 ? 1 : -1);
        startTimer();
    }, { passive: true });

    // ── Responsive ──
    window.addEventListener('resize', function() {
        VISIBLE_RANGE = window.innerWidth > 960 ? 2 : 1;
        updateCarousel();
    });

    // ── Init ──
    updateCarousel();
    startTimer();
</script>
</body>
</html>
