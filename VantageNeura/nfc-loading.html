<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VantageNeura — Opening Review</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #0a0e15 0%, #151b2b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 0;
            perspective: 1200px;
        }

        /* ---------- Top text ---------- */
        .top-section {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 30px;
        }

        .top-text {
            color: #e8eef5;
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-align: center;
            max-width: 85%;
            line-height: 1.3;
        }

        /* ---------- Middle — rotating V + stable dot ---------- */
        .middle-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container {
            width: 40vw;
            height: 40vw;
            max-width: 320px;
            max-height: 320px;
            perspective: 1000px;
            position: relative;
        }

        /* Wrapper that spins continuously — no easing, no pause */
        .rotating-layer {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            animation: spinY 3s linear infinite;
            will-change: transform;
        }

        @keyframes spinY {
            from { transform: rotateY(0deg); }
            to   { transform: rotateY(360deg); }
        }

        .v-svg,
        .dot-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .v-svg {
            filter: drop-shadow(0 0 30px rgba(128, 254, 254, 0.35));
        }

        /* Dot pulse — gentle, sits on top of the static (non-rotating) layer */
        .dot-svg {
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1;    transform: scale(1); }
            50%      { opacity: 0.78; transform: scale(1.08); }
        }

        /* ---------- Bottom — Powered by VantageNeura ---------- */
        .bottom-section {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 30px;
        }

        .bottom-text {
            color: #8b92a9;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 1.8;
        }

        .brand-name {
            color: #80fefe;
            font-weight: 600;
            font-size: 14px;
            display: block;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 600px) {
            .top-text    { font-size: 24px; }
            .bottom-text { font-size: 12px; }
            .logo-container { max-width: 280px; max-height: 280px; }
        }

        @media (max-width: 400px) {
            .top-text    { font-size: 20px; }
            .bottom-text { font-size: 11px; }
            .logo-container { max-width: 220px; max-height: 220px; }
        }
    </style>
</head>
<body>
    <!-- TOP -->
    <div class="top-section">
        <div class="top-text">Opening your review page</div>
    </div>

    <!-- MIDDLE: rotating V with stable, pulsing dot -->
    <div class="middle-section">
        <div class="logo-container">

            <!-- The V spins continuously on Y axis -->
            <div class="rotating-layer">
                <svg class="v-svg" viewBox="0 0 140 160" xmlns="http://www.w3.org/2000/svg" aria-label="VantageNeura V">
                    <defs>
                        <!--
                          Gradients pulled directly from the reference HTML:
                          light cyan #80fefe -> mid teal #09a2d4 -> deeper teal #0484a1.
                          Left stroke runs gradient top-left -> bottom-right.
                          Right stroke is the mirror: top-right -> bottom-left.
                        -->
                        <linearGradient id="leftStroke" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%"   stop-color="#80fefe"/>
                            <stop offset="50%"  stop-color="#09a2d4"/>
                            <stop offset="100%" stop-color="#0484a1"/>
                        </linearGradient>
                        <linearGradient id="rightStroke" x1="100%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%"   stop-color="#80fefe"/>
                            <stop offset="50%"  stop-color="#09a2d4"/>
                            <stop offset="100%" stop-color="#0484a1"/>
                        </linearGradient>
                    </defs>

                    <!--
                      LEFT STROKE — constant-thickness quadrilateral.
                        A (top-outer)     : (20, 10)
                        B (top-inner)     : (34, 10)   -> top edge AB is flat, length 14
                        C (bottom-inner)  : (61, 97)   -> inner edge BC at left-stroke slope
                        D (bottom-outer)  : (54, 120)  -> outer edge DA at left-stroke slope
                      Both side edges are parallel (same slope) so horizontal thickness
                      stays 14 the whole way down. The bottom CD is the angled cut,
                      running at the RIGHT stroke's slope (i.e. parallel to where the
                      right stroke comes down from).
                    -->
                    <polygon points="20,10 34,10 61,97 54,120" fill="url(#leftStroke)"/>

                    <!--
                      RIGHT STROKE — mirror of the left around x=70.
                        A' (top-outer)    : (120, 10)
                        B' (top-inner)    : (106, 10)
                        C' (bottom-inner) : (79, 97)
                        D' (bottom-outer) : (86, 120)
                      Bottom is angled at the LEFT stroke's slope, mirroring the left.
                    -->
                    <polygon points="120,10 106,10 79,97 86,120" fill="url(#rightStroke)"/>
                </svg>
            </div>

            <!-- Dot sits OUTSIDE the rotating layer so it stays put while the V spins -->
            <svg class="dot-svg" viewBox="0 0 140 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <!-- Triple-stacked glow circles (same recipe as the reference) -->
                <circle cx="70" cy="138" r="15" fill="#80fefe" opacity="0.20"/>
                <circle cx="70" cy="138" r="11" fill="#80fefe" opacity="0.50"/>
                <circle cx="70" cy="138" r="7"  fill="#80fefe" opacity="0.90"/>
            </svg>

        </div>
    </div>

    <!-- BOTTOM -->
    <div class="bottom-section">
        <div class="bottom-text">
            Powered by
            <span class="brand-name">VantageNeura</span>
        </div>
    </div>

    <script>
        // Optional auto-redirect — replace URL when ready.
        // setTimeout(() => { window.location.href = 'https://YOUR_REVIEW_URL'; }, 1500);
    </script>
</body>
</html>
